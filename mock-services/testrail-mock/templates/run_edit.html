{% extends "base.html" %}
{% block title %}Edit Run – TestRail Mock{% endblock %}

{% block content %}
<div class="tr-breadcrumb" style="margin:-20px -24px 16px -24px;">
    <a href="/ui/runs">Test Runs</a>
    <span class="sep">›</span>
    <a href="/ui/run/{{ run.id }}">{{ run.name }}</a>
    <span class="sep">›</span>
    <span>Edit</span>
</div>

<div style="max-width:600px;">
<div class="tr-card">
    <div class="tr-card-header">
        <div class="tr-card-title">Edit Test Run</div>
    </div>
    <div class="tr-card-body">
        <form action="/ui/run/{{ run.id }}/edit" method="post">
            <div class="form-group">
                <label class="form-label">Name <span class="required">*</span></label>
                <input type="text" name="name" class="form-control" required value="{{ run.name }}">
            </div>
            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control">{{ run.description or '' }}</textarea>
            </div>
            <div class="flex gap-8">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="/ui/run/{{ run.id }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</div>
{% endblock %}
