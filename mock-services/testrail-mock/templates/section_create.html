{% extends "base.html" %}
{% block title %}New Section – TestRail Mock{% endblock %}

{% block content %}
<div class="tr-breadcrumb" style="margin:-20px -24px 16px -24px;">
    <a href="/ui/cases">Test Cases</a>
    <span class="sep">›</span>
    <span>New Section</span>
</div>

<div style="max-width:500px;">
<div class="tr-card">
    <div class="tr-card-header">
        <div class="tr-card-title">New Section</div>
    </div>
    <div class="tr-card-body">
        <form action="/ui/sections/create" method="post">
            <div class="form-group">
                <label class="form-label">Name <span class="required">*</span></label>
                <input type="text" name="name" class="form-control" required placeholder="Section name…">
            </div>
            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" placeholder="Optional description…"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">Parent Section</label>
                <select name="parent_id" class="form-control">
                    <option value="">— None (top-level) —</option>
                    {% for s in sections %}
                    <option value="{{ s.id }}">{{ s.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="flex gap-8">
                <button type="submit" class="btn btn-primary">Create Section</button>
                <a href="/ui/cases" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</div>
{% endblock %}
