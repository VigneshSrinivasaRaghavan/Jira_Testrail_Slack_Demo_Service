{% extends "base.html" %}
{% block title %}New Test Run – TestRail Mock{% endblock %}

{% block content %}
<div class="tr-breadcrumb" style="margin:-20px -24px 16px -24px;">
    <a href="/ui/runs">Test Runs</a>
    <span class="sep">›</span>
    <span>New Test Run</span>
</div>

<div style="max-width:600px;">
<div class="tr-card">
    <div class="tr-card-header">
        <div class="tr-card-title">New Test Run</div>
    </div>
    <div class="tr-card-body">
        <form action="/ui/runs/create" method="post">
            <div class="form-group">
                <label class="form-label">Name <span class="required">*</span></label>
                <input type="text" name="name" class="form-control" required placeholder="e.g. Sprint 12 Regression">
            </div>
            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" placeholder="Optional description…"></textarea>
            </div>
            <div class="flex gap-8">
                <button type="submit" class="btn btn-primary">Create Test Run</button>
                <a href="/ui/runs" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</div>
{% endblock %}
