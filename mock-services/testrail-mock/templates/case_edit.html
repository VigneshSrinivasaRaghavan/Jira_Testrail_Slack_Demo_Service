{% extends "base.html" %}
{% block title %}Edit C{{ case.id }} – TestRail Mock{% endblock %}

{% block content %}
<div class="tr-breadcrumb" style="margin:-20px -24px 16px -24px;">
    <a href="/ui/cases">Test Cases</a>
    <span class="sep">›</span>
    <a href="/ui/case/{{ case.id }}">C{{ case.id }} – {{ case.title[:50] }}</a>
    <span class="sep">›</span>
    <span>Edit</span>
</div>

<div style="max-width:800px;">
<div class="tr-card">
    <div class="tr-card-header">
        <div class="tr-card-title">Edit Test Case C{{ case.id }}</div>
    </div>
    <div class="tr-card-body">
        <form action="/ui/case/{{ case.id }}/edit" method="post" id="case-form">

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                <div class="form-group" style="grid-column:1/-1;">
                    <label class="form-label">Title <span class="required">*</span></label>
                    <input type="text" name="title" class="form-control" required value="{{ case.title }}">
                </div>

                <div class="form-group">
                    <label class="form-label">Section <span class="required">*</span></label>
                    <select name="section_id" class="form-control" required>
                        {% for section in sections %}
                        <option value="{{ section.id }}" {% if section.id == case.section_id %}selected{% endif %}>
                            {{ section.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Template</label>
                    <select name="template_id" class="form-control">
                        {% for tmpl in templates %}
                        <option value="{{ tmpl.id }}" {% if tmpl.id == case.template_id %}selected{% endif %}>{{ tmpl.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Type</label>
                    <select name="type_id" class="form-control">
                        {% for tid, tname in type_names.items() %}
                        <option value="{{ tid }}" {% if tid == case.type_id %}selected{% endif %}>{{ tname }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Priority</label>
                    <select name="priority_id" class="form-control">
                        {% for pid, pname in priority_names.items() %}
                        <option value="{{ pid }}" {% if pid == case.priority_id %}selected{% endif %}>{{ pname }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group" style="grid-column:1/-1;">
                    <label class="form-label">Preconditions</label>
                    <textarea name="preconditions" class="form-control">{{ case.preconditions or '' }}</textarea>
                </div>
            </div>

            <!-- Steps -->
            <div class="form-group">
                <label class="form-label">Test Steps</label>
                <table class="steps-table" style="margin-bottom:8px;">
                    <thead>
                        <tr><th class="step-num">#</th><th>Step / Action</th><th>Expected Result</th><th style="width:40px;"></th></tr>
                    </thead>
                    <tbody id="steps-body">
                    </tbody>
                </table>
                <button type="button" onclick="addStep()" class="btn btn-sm btn-secondary">+ Add Step</button>
            </div>

            <div class="form-group">
                <label class="form-label">Expected Result</label>
                <textarea name="expected_result" class="form-control">{{ case.expected_result or '' }}</textarea>
            </div>

            <div class="flex gap-8">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="/ui/case/{{ case.id }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</div>

<script>
const existingSteps = {{ case.steps | tojson if case.steps else '[]' }};
let stepCount = 0;

function addStep(stepVal, expectedVal) {
    const i = stepCount++;
    const tr = document.createElement('tr');
    tr.innerHTML = `
        <td class="step-num">${i+1}</td>
        <td><textarea name="steps[${i}][step]" class="form-control" rows="2">${stepVal||''}</textarea></td>
        <td><textarea name="steps[${i}][expected]" class="form-control" rows="2">${expectedVal||''}</textarea></td>
        <td><button type="button" onclick="this.closest('tr').remove();renumberSteps();" class="btn btn-xs btn-danger">✕</button></td>
    `;
    document.getElementById('steps-body').appendChild(tr);
}

function renumberSteps() {
    document.querySelectorAll('#steps-body tr').forEach((tr, i) => {
        tr.querySelector('.step-num').textContent = i + 1;
    });
}

// Load existing steps
if (existingSteps && existingSteps.length > 0) {
    existingSteps.forEach(s => addStep(s.content || s.step || '', s.expected || ''));
} else {
    addStep();
}
</script>
{% endblock %}
