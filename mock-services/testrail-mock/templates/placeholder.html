{% extends "base.html" %}
{% block title %}{{ feature_name }} – TestRail Mock{% endblock %}

{% block content %}
<div class="tr-card" style="max-width:500px;margin:40px auto;text-align:center;">
    <div class="tr-card-body" style="padding:48px 32px;">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--tr-gray-400)" stroke-width="1.5" style="margin-bottom:16px;">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <h2 class="fw-600" style="font-size:18px;margin-bottom:8px;">{{ feature_name }}</h2>
        <p class="text-muted" style="margin-bottom:24px;">{{ description }}</p>
        <p class="text-muted text-small" style="margin-bottom:24px;">This feature is a placeholder in the mock service.</p>
        <a href="{{ back_url }}" class="btn btn-primary">← Go Back</a>
    </div>
</div>
{% endblock %}
